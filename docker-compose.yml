services:
  postgres:
    image: postgres:18-alpine
    container_name: splitpay-postgres
    environment:
      POSTGRES_DB: splitpay_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: splitpay-redis
    ports:
      - '6379:6379'
    command: redis-server --requirepass redis_secret

volumes:
  pg_data:
